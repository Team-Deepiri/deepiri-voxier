name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    shell: bash

env:
  GODOT_VERSION: '4.2.2'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Godot and export templates
        run: bash scripts/ci/install-godot.sh

      - name: Export Linux release
        run: bash scripts/ci/export-release.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: release/Voxier-latest.zip
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Godot and export templates
        run: bash scripts/ci/install-godot.sh

      - name: Export macOS release
        run: bash scripts/ci/export-release.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: release/Voxier-latest.dmg
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Godot and export templates
        run: bash scripts/ci/install-godot.sh

      - name: Export Windows release
        run: bash scripts/ci/export-release.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: release/Voxier-latest.exe
          if-no-files-found: error

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/linux/Voxier-latest.zip
            artifacts/macos/Voxier-latest.dmg
            artifacts/windows/Voxier-latest.exe
